[phases.setup]
nixPkgs = ['php84', 'php84Extensions.pdo_mysql', 'php84Extensions.mbstring', 'php84Extensions.xml', 'php84Extensions.curl', 'php84Extensions.tokenizer', 'php84Extensions.dom', 'php84Extensions.zip', 'php84Extensions.bcmath', 'nodejs_20', 'npm-9_x']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader', 'npm ci']

[phases.build]
cmds = [
    'npm run build',
    'php artisan config:clear',
    'php artisan route:clear',
    'php artisan view:clear',
    'mkdir -p storage/framework/{sessions,views,cache} storage/logs bootstrap/cache',
    'chmod -R 775 storage bootstrap/cache'
]

[start]
cmd = 'php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'
